version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pa_db
    environment:
      POSTGRES_DB: priorauth
      POSTGRES_USER: pa_user
      POSTGRES_PASSWORD: pa_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pa_user -d priorauth"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
